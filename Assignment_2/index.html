<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laundry Services</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      overflow: hidden;
      background-color: #ffffff;
    }

    /* Navbar */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 10vh;
      border-bottom: 1px solid #f0f0f0;
    }

    .nav-logo {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a1a2e;
    }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: #444;
      font-size: 1rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: #3b9edd;
    }

    .nav-user {
      background-color: #e8f4fd;
      color: #3b9edd;
      border: none;
      padding: 10px 24px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }

    /* Hero Section */
    .hero {
      display: flex;
      align-items: center;
      height: 90vh;
      padding: 0 80px;
    }

    .hero-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 20px;
      padding-right: 40px;
    }

    .hero-left h1 {
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 800;
      color: #1a1a2e;
      line-height: 1.2;
    }

    .hero-left h1 span {
      color: #3b9edd;
    }

    .hero-left p {
      font-size: clamp(0.9rem, 1.2vw, 1.05rem);
      color: #6b7280;
      line-height: 1.7;
      max-width: 480px;
    }

    .btn-book {
      display: inline-block;
      background-color: #3b9edd;
      color: #ffffff;
      padding: 18px 40px;
      border-radius: 14px;
      border: none;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      width: fit-content;
      transition: background-color 0.2s, transform 0.15s;
    }

    .btn-book:hover {
      background-color: #2a88cc;
      transform: translateY(-2px);
    }

    .hero-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .hero-right img {
      max-height: 75vh;
      max-width: 100%;
      width: 100%;
      object-fit: cover;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(59,158,221,0.2);
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">Logo</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">About Us</a></li>
      <li><a href="#">Contact Us</a></li>
    </ul>
    <button class="nav-user">Username</button>
  </nav>

  <section class="hero">
    <div class="hero-left">
      <h1>
        Revitalize Your<br />
        Clothes with Expert<br />
        <span>Laundry Services!</span>
      </h1>
      <p>
        From premium dry cleaning to swift wash and fold, we deliver care
        and convenience. Schedule a pickup and rediscover the freshness of
        your clothes today!
      </p>
      <button class="btn-book">Book a service today!</button>
    </div>
    <div class="hero-right">
      <img
        src="https://images.unsplash.com/photo-1626806787461-102c1bfaaea1?w=600&auto=format&fit=crop"
        alt="Laundry Washing Machine"
      />
    </div>
  </section>

</body>
</html>
